<div class="svg-chart-outer">
  <!-- Reset zoom button -->
  @if (isZoomed) {
    <button class="zoom-reset-btn" type="button" (click)="resetZoom()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 11A9 9 0 1 0 12 21"/>
        <polyline points="21 3 21 11 13 11"/>
      </svg>
      Reset zoom
    </button>
  }

  <svg
    [attr.viewBox]="'0 0 ' + SVG_W + ' ' + SVG_H"
    width="100%"
    height="100%"
    preserveAspectRatio="none"
    class="chart-svg"
    [class.chart-dragging]="isDragging"
    (mousedown)="onSvgMouseDown($event)"
    (mousemove)="onSvgMouseMove($event)"
    (mouseup)="onSvgMouseUp($event)"
    (mouseleave)="onSvgMouseLeave()"
  >
    <defs>
      @for (metric of activeMetrics; track metric; let i = $index) {
        @if (i === 0) {
          <linearGradient [id]="'grad-' + metric" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" [attr.stop-color]="getColor(metric)" stop-opacity="0.18"/>
            <stop offset="100%" [attr.stop-color]="getColor(metric)" stop-opacity="0"/>
          </linearGradient>
        }
      }
    </defs>

    <!-- Grid lines -->
    @for (n of gridLines; track n) {
      <line
        [attr.x1]="PAD_LEFT"
        [attr.y1]="gridY(n)"
        [attr.x2]="SVG_W - PAD_RIGHT"
        [attr.y2]="gridY(n)"
        class="grid-line"
      />
      <text
        [attr.x]="PAD_LEFT - 6"
        [attr.y]="gridY(n) + 4"
        text-anchor="end"
        class="axis-label"
      >{{ gridLabel(n) }}</text>
    }

    <!-- Bar mode: primary metric bars -->
    @if (chartType === 'bar' && activeMetrics.length && visData.length) {
      @for (point of visData; track i; let i = $index) {
        <rect
          [attr.x]="getBarX(i)"
          [attr.y]="getBarY(activeMetrics[0], i)"
          [attr.width]="barW"
          [attr.height]="getBarHeight(activeMetrics[0], i)"
          rx="3"
          [attr.fill]="hoveredIndex === i ? getColor(activeMetrics[0]) : getColor(activeMetrics[0]) + '99'"
          class="bar-rect"
        />
      }
    }

    <!-- Line mode: area gradient fill for primary metric only -->
    @if (chartType === 'line' && activeMetrics.length && visData.length) {
      <path
        [attr.d]="getAreaPath(activeMetrics[0])"
        [attr.fill]="'url(#grad-' + activeMetrics[0] + ')'"
      />
    }

    <!-- Previous period dashed line (rendered below current line) -->
    @if (hasPreviousData) {
      <path
        [attr.d]="getPrevLinePath(activeMetrics[0])"
        fill="none"
        stroke="#2a3a42"
        stroke-width="1.5"
        stroke-dasharray="3 3"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    }

    <!-- Lines for each active metric -->
    @for (metric of activeMetrics; track metric; let mi = $index) {
      @if (chartType === 'line' || mi > 0) {
        <path
          [attr.d]="getLinePath(metric)"
          fill="none"
          [attr.stroke]="getColor(metric)"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      }
    }

    <!-- Dots at each data point (line mode only) -->
    @if (chartType === 'line' && visData.length) {
      @for (metric of activeMetrics; track metric) {
        @for (point of visData; track i; let i = $index) {
          <circle
            [attr.cx]="getLineX(i)"
            [attr.cy]="getY(metric, i)"
            [attr.r]="getDotRadius(i)"
            [attr.fill]="hoveredIndex === i ? '#ffffff' : getColor(metric)"
            [attr.stroke]="getColor(metric)"
            [attr.stroke-width]="hoveredIndex === i ? 2.5 : 1"
            class="data-dot"
          />
        }
      }
    }

    <!-- Drag-to-zoom selection rectangle -->
    @if (isDragging && dragRectW > 4) {
      <rect
        [attr.x]="dragRectX"
        [attr.y]="PAD_TOP"
        [attr.width]="dragRectW"
        [attr.height]="innerH"
        class="drag-selection"
        pointer-events="none"
      />
    }

    <!-- Crosshair vertical line -->
    @if (hoveredIndex !== null && !isDragging) {
      <line
        [attr.x1]="crosshairX(hoveredIndex)"
        [attr.y1]="PAD_TOP"
        [attr.x2]="crosshairX(hoveredIndex)"
        [attr.y2]="PAD_TOP + innerH"
        stroke="rgba(255,255,255,0.15)"
        stroke-width="1"
        stroke-dasharray="4"
      />
    }

    <!-- Invisible hover zones spanning full chart height -->
    @for (point of visData; track i; let i = $index) {
      <rect
        [attr.x]="hoverZoneX(i)"
        [attr.y]="PAD_TOP"
        [attr.width]="hoverZoneW(i)"
        [attr.height]="innerH"
        fill="transparent"
        class="hover-zone"
        (mouseenter)="!isDragging && (hoveredIndex = i)"
      />
    }

    <!-- X-axis: fixed from/till labels always anchored to chart edges -->
    @if (xRangeStartLabel) {
      <text
        [attr.x]="PAD_LEFT"
        [attr.y]="SVG_H - 8"
        text-anchor="start"
        class="axis-label"
      >{{ xRangeStartLabel }}</text>
    }
    @if (xRangeStopLabel) {
      <text
        [attr.x]="SVG_W - PAD_RIGHT"
        [attr.y]="SVG_H - 8"
        text-anchor="end"
        class="axis-label"
      >{{ xRangeStopLabel }}</text>
    }

    <!-- X-axis: intermediate date labels (first/last already shown above) -->
    @for (point of visData; track i; let i = $index) {
      @if (showXLabel(i)) {
        <text
          [attr.x]="chartType === 'bar' ? getBarMidX(i) : getLineX(i)"
          [attr.y]="SVG_H - 8"
          text-anchor="middle"
          class="axis-label"
        >{{ getXLabelText(i) }}</text>
      }
    }
  </svg>

  <!-- Previous period legend -->
  @if (hasPreviousData) {
    <div class="chart-period-legend">
      <span class="legend-item">
        <svg width="16" height="4" style="display:inline-block;vertical-align:middle;">
          <line x1="0" y1="2" x2="16" y2="2" stroke="#1ca698" stroke-width="2.2" stroke-linecap="round"/>
        </svg>
        <span class="legend-label">Current</span>
      </span>
      <span class="legend-item">
        <svg width="16" height="4" style="display:inline-block;vertical-align:middle;">
          <line x1="0" y1="2" x2="16" y2="2" stroke="#2a3a42" stroke-width="1.5" stroke-dasharray="3 3" stroke-linecap="round"/>
        </svg>
        <span class="legend-label">Previous</span>
      </span>
    </div>
  }

  <!-- Floating tooltip (suppressed while dragging) -->
  @if (hoveredIndex !== null && visData.length && !isDragging) {
    <div
      class="chart-tooltip"
      [class.tooltip-flip]="tooltipOnLeft"
      [style.left]="tooltipLeftPct + '%'"
    >
      <div class="tooltip-date">{{ visData[hoveredIndex].label }}</div>
      @for (metric of activeMetrics; track metric) {
        <div class="tooltip-row">
          <span class="tooltip-dot" [style.background]="getColor(metric)"></span>
          <span class="tooltip-metric">{{ getLabel(metric) }}</span>
          <span class="tooltip-value">{{ formatTooltipValue(metric, hoveredIndex) }}</span>
        </div>
      }
    </div>
  }
</div>
